name: 2) Cloudflare VPS Temporary Access

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install cloudflared (manual)
        run: |
          echo "⬇️ Installing cloudflared..."
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          cloudflared --version

      - name: Connect to VPS via Cloudflare
        run: |
          echo "🚀 Connecting to VPS..."

          cloudflared access ssh --hostname rover-frequency-load-formal.trycloudflare.com << 'EOF'
          echo "✅ Connected Successfully"
          echo "👤 User:"
          whoami
          echo "💻 Host:"
          hostname
          echo "⏳ Uptime:"
          uptime
          echo "💾 Disk:"
          df -h
          echo "🧠 RAM:"
          free -m
          EOF

      - name: Keep Session Alive
        run: |
          echo "⏳ Session active for testing (15 min)..."
          sleep 900
