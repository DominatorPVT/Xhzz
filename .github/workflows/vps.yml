name: 🚀 Action VPS 😈🔥

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Setup VPS 😎
        run: |
          echo "🚀 Updating system..."
          sudo apt update -y

          echo "📦 Installing packages..."
          sudo apt install -y openssh-server curl python3 openssh-client autossh

          echo "🎲 Generating login..."
          USERNAME=$(tr -dc 'a-z0-9' < /dev/urandom | head -c 10)
          PASSWORD=$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 12)

          echo "👤 Creating user..."
          sudo useradd -m -s /bin/bash $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME

          echo "🔐 Configuring SSH..."
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#GatewayPorts no/GatewayPorts yes/' /etc/ssh/sshd_config
          sudo service ssh restart

          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: 🔑 Generate SSH Key for serveo
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/serveo_key -N "" -q
          echo "SSH key generated!"
          # Add serveo.net to known hosts
          ssh-keyscan -H serveo.net >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🌐 Start Tunnel (serveo.net)
        run: |
          echo "🚇 Starting serveo.net tunnel..."
          autossh -M 0 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            -i ~/.ssh/serveo_key \
            -R 0:localhost:22 \
            serveo.net > tunnel.log 2>&1 &

          echo "⏳ Waiting for tunnel..."
          for i in {1..25}; do
            sleep 4
            PORT=$(grep -oP 'port \K[0-9]+' tunnel.log 2>/dev/null | head -1 || echo "")
            if [ -n "$PORT" ]; then
              echo "================================"
              echo "✅ TUNNEL READY!"
              echo "🌐 HOST : serveo.net"
              echo "🔌 PORT : $PORT"
              echo "================================"
              echo "SSH_PORT=$PORT" >> $GITHUB_ENV
              break
            fi
            echo "⏳ Retry $i/25..."
          done

          echo ""
          echo "--- Tunnel Log ---"
          cat tunnel.log || true

      - name: 🔐 Login Details 😏
        run: |
          echo ""
          echo "╔══════════════════════════════╗"
          echo "║       SSH LOGIN DETAILS      ║"
          echo "╠══════════════════════════════╣"
          echo "║ 🌐 HOST : serveo.net"
          echo "║ 🔌 PORT : $SSH_PORT"
          echo "║ 👤 USER : $USERNAME"
          echo "║ 🔑 PASS : $PASSWORD"
          echo "╠══════════════════════════════╣"
          echo "║ 💻 COMMAND:"
          echo "║ ssh $USERNAME@serveo.net -p $SSH_PORT"
          echo "╚══════════════════════════════╝"

      - name: ⏳ Keep Alive 😴
        run: sleep 21600
