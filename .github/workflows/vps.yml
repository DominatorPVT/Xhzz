name: 🖥️ Action VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 🔧 Install tmate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmate

      - name: 👤 Create User
        run: |
          sudo useradd -m -s /bin/bash vpsuser
          echo "vpsuser:Vps@2024#Secure" | sudo chpasswd
          sudo usermod -aG sudo vpsuser
          echo "vpsuser ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/vpsuser

      - name: 🚀 Start tmate Session
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

          SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          HOST=$(echo $SSH_CMD | awk '{print $NF}' | cut -d@ -f2)
          USER=$(echo $SSH_CMD | awk '{print $NF}' | cut -d@ -f1)
          WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')

          echo "╔════════════════════════════════════════════╗"
          echo "║           🚀 VPS LOGIN DETAILS             ║"
          echo "╠════════════════════════════════════════════╣"
          echo "║ 🌐 Host     : $HOST"
          echo "║ 🔌 Port     : 22"
          echo "║ 👤 Username : $USER"
          echo "║ 🔑 Password : Vps@2024#Secure"
          echo "╠════════════════════════════════════════════╣"
          echo "║ 🌐 Web URL  : $WEB"
          echo "║ 💻 SSH CMD  : $SSH_CMD"
          echo "╚════════════════════════════════════════════╝"

      - name: ⏳ Keep Alive
        run: sleep 18000
