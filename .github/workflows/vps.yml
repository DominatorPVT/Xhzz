name: 🖥️ Action VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 🔧 System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server curl wget net-tools

      - name: 👤 Create User
        run: |
          sudo useradd -m -s /bin/bash vpsuser
          echo "vpsuser:Vps@2024#Secure" | sudo chpasswd
          sudo usermod -aG sudo vpsuser
          echo "vpsuser ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/vpsuser

      - name: 🔐 Configure SSH
        run: |
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          sudo service ssh start || sudo systemctl start ssh

      - name: 🌐 Setup Zrok Tunnel
        run: |
          wget -q https://github.com/openziti/zrok/releases/latest/download/zrok_linux_amd64.tar.gz
          tar -xzf zrok_linux_amd64.tar.gz
          chmod +x zrok
          sudo mv zrok /usr/local/bin/
          zrok enable ${{ secrets.ZROK_TOKEN }}
          zrok share public localhost:22 --backend-mode tcpTunnel > /tmp/zrok.log 2>&1 &
          sleep 12
          ZROK_ADDR=$(grep -oP '[a-z0-9]+\.share\.zrok\.io:\d+' /tmp/zrok.log | head -1)
          HOST=$(echo $ZROK_ADDR | cut -d: -f1)
          PORT=$(echo $ZROK_ADDR | cut -d: -f2)
          echo "╔════════════════════════════════════════════╗"
          echo "║           🚀 VPS LOGIN DETAILS             ║"
          echo "╠════════════════════════════════════════════╣"
          echo "║ 💻 SSH CMD : ssh -p $PORT vpsuser@$HOST"
          echo "╠════════════════════════════════════════════╣"
          echo "║ 🌐 Host     : $HOST"
          echo "║ 🔌 Port     : $PORT"
          echo "║ 👤 Username : vpsuser"
          echo "║ 🔑 Password : Vps@2024#Secure"
          echo "╚════════════════════════════════════════════╝"

      - name: ⏳ Keep Alive
        run: sleep 18000
