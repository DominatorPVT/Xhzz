name: 🚀 Action VPS 😈🔥

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Setup VPS 😎
        run: |
          echo "🚀 Updating system..."
          sudo apt update

          echo "📦 Installing packages..."
          sudo apt install -y openssh-server curl python3

          echo "🎲 Generating login..."
          USERNAME=$(tr -dc a-z0-9 </dev/urandom | head -c 10)
          PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 10)

          echo "👤 Creating user..."
          sudo useradd -m $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME

          echo "🔐 Enabling SSH..."
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh start

          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: 🌐 Install & Start Ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          ./ngrok authtoken ${{ secrets.NGROK_TOKEN }}
          nohup ./ngrok tcp 22 --log=stdout > ngrok.log 2>&1 &

          echo "⏳ Waiting for ngrok tunnel..."
          for i in {1..20}; do
            sleep 3
            RESPONSE=$(curl -sf http://localhost:4040/api/tunnels 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ]; then
              URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tunnels'][0]['public_url'])" 2>/dev/null || echo "")
              if [ -n "$URL" ]; then
                HOST=$(echo "$URL" | cut -d'/' -f3 | cut -d':' -f1)
                PORT=$(echo "$URL" | cut -d':' -f3)
                echo "================================"
                echo "🌐 HOST: $HOST"
                echo "🔌 PORT: $PORT"
                echo "================================"
                break
              fi
            fi
            echo "Retry $i/20..."
          done

      - name: 🔐 Login Details 😏
        run: |
          echo "================================"
          echo "👤 USERNAME : $USERNAME"
          echo "🔑 PASSWORD : $PASSWORD"
          echo "================================"

      - name: ⏳ Keep Alive 😴
        run: sleep 21600
