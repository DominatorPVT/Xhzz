name: 🚀 Action VPS 😈🔥

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Setup VPS 😎
        run: |
          echo "🚀 Updating system..."
          sudo apt update

          echo "📦 Installing packages..."
          sudo apt install -y openssh-server curl python3 openssh-client

          echo "🎲 Generating login..."
          USERNAME=$(tr -dc a-z0-9 </dev/urandom | head -c 10)
          PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 10)

          echo "👤 Creating user..."
          sudo useradd -m $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME

          echo "🔐 Enabling SSH..."
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo service ssh restart

          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: 🌐 Start Tunnel (localhost.run)
        run: |
          echo "🔑 Generating SSH key..."
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q

          echo "🚇 Starting localhost.run tunnel..."
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -R 0:localhost:22 \
              plan@localhost.run \
              -- --output json 2>/dev/null > tunnel.log &

          echo "⏳ Waiting for tunnel..."
          for i in {1..20}; do
            sleep 3
            URL=$(grep -o '"address":"[^"]*"' tunnel.log 2>/dev/null | head -1 | cut -d'"' -f4 || echo "")
            if [ -n "$URL" ]; then
              HOST=$(echo "$URL" | cut -d':' -f1)
              PORT=$(echo "$URL" | cut -d':' -f2)
              echo "================================"
              echo "🌐 HOST: $HOST"
              echo "🔌 PORT: $PORT"
              echo "================================"
              break
            fi
            echo "Retry $i/20..."
          done

          cat tunnel.log || true

      - name: 🔐 Login Details 😏
        run: |
          echo "================================"
          echo "👤 USERNAME : $USERNAME"
          echo "🔑 PASSWORD : $PASSWORD"
          echo "================================"

      - name: ⏳ Keep Alive 😴
        run: sleep 21600
