name: 🖥️ Free VPS Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'   # har 5 ghante auto restart

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 🔧 System Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server curl wget net-tools

      - name: 👤 Create VPS User
        run: |
          sudo useradd -m -s /bin/bash vpsuser
          echo "vpsuser:Vps@2024#Secure" | sudo chpasswd
          sudo usermod -aG sudo vpsuser
          echo "vpsuser ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/vpsuser

      - name: 🔐 Configure SSH
        run: |
          sudo mkdir -p /etc/ssh
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          sudo service ssh start || sudo systemctl start ssh

      - name: 🌐 Get Public IP via ngrok
        run: |
          # ngrok download
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok

          # ngrok auth token (apna token daalo GitHub Secret me)
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

          # SSH tunnel start
          ./ngrok tcp 22 --log=stdout &
          sleep 8

          # IP + Port nikalo
          TUNNEL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          addr = data['tunnels'][0]['public_url'].replace('tcp://', '')
          host, port = addr.split(':')
          print(f'HOST={host}')
          print(f'PORT={port}')
          ")

          echo "========================================" 
          echo "  🖥️  FREE VPS READY!  "
          echo "========================================"
          eval $TUNNEL
          echo ""
          echo "  🌐 SSH Command:"
          echo "  ssh -p $PORT vpsuser@$HOST"
          echo ""
          echo "  👤 Username : vpsuser"
          echo "  🔑 Password : Vps@2024#Secure"
          echo ""
          echo "  ⏰ Session Time: ~5 hours"
          echo "========================================"

      - name: ⏳ Keep Alive
        run: |
          echo "VPS is running... 🚀"
          sleep 18000
