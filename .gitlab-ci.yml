stages:
  - vps

vps:
  stage: vps
  image: ubuntu:latest
  timeout: 6h
  script:
    - apt update -y
    - apt install -y curl xz-utils

    - curl -Lo tmate.tar.xz https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz
    - tar -xf tmate.tar.xz
    - mv tmate-2.4.0-static-linux-amd64/tmate /usr/bin/tmate
    - rm -rf tmate.tar.xz tmate-2.4.0-static-linux-amd64

    - mkdir -p ~/.ssh
    - ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q
    - ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q

    - tmate -S /tmp/tmate.sock new-session -d
    - tmate -S /tmp/tmate.sock wait tmate-ready

    - SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
    - WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')

    - echo ""
    - echo "╔════════════════════════════════════════════╗"
    - echo "║           🚀 VPS LOGIN DETAILS             ║"
    - echo "╠════════════════════════════════════════════╣"
    - echo "║ 💻 SSH CMD => $SSH_CMD"
    - echo "║ 🌐 WEB URL => $WEB_URL"
    - echo "╠════════════════════════════════════════════╣"
    - HOST=$(echo $SSH_CMD | awk '{print $3}' | cut -d'@' -f2)
    - USER=$(echo $SSH_CMD | awk '{print $3}' | cut -d'@' -f1)
    - echo "║ 🌐 Host     => $HOST"
    - echo "║ 🔌 Port     => 22"
    - echo "║ 👤 Username => $USER"
    - echo "║ 🔑 Auth     => No password (key based)"
    - echo "╚════════════════════════════════════════════╝"
    - echo ""
    - echo "📊 System Info:"
    - echo "🖥️  CPU  => $(nproc) cores"
    - echo "💾 RAM  => $(free -h | awk '/^Mem:/ {print $2}')"
    - echo "💿 DISK => $(df -h / | awk 'NR==2 {print $4}') free"
    - echo "🌍 IP   => $(curl -s ifconfig.me)"

    - sleep 21600
