stages:
  - vps

vps:
  stage: vps
  image: ubuntu:latest
  timeout: 6h
  script:
    - apt update -y
    - apt install -y openssh-server curl python3 openssh-client autossh

    - USERNAME=$(tr -dc 'a-z0-9' < /dev/urandom | head -c 10)
    - PASSWORD=$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 12)

    - useradd -m -s /bin/bash $USERNAME
    - echo "$USERNAME:$PASSWORD" | chpasswd
    - usermod -aG sudo $USERNAME

    - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
    - sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
    - sed -i 's/#GatewayPorts no/GatewayPorts yes/' /etc/ssh/sshd_config
    - service ssh restart || true

    - mkdir -p ~/.ssh
    - ssh-keygen -t rsa -b 4096 -f ~/.ssh/serveo_key -N "" -q
    - ssh-keyscan -H serveo.net >> ~/.ssh/known_hosts 2>/dev/null || true

    - |
      autossh -M 0 \
        -o StrictHostKeyChecking=no \
        -o ServerAliveInterval=30 \
        -o ServerAliveCountMax=3 \
        -o ExitOnForwardFailure=yes \
        -i ~/.ssh/serveo_key \
        -R 0:localhost:22 \
        serveo.net > tunnel.log 2>&1 &

    - |
      for i in $(seq 1 25); do
        sleep 4
        PORT=$(grep -oP 'port \K[0-9]+' tunnel.log 2>/dev/null | head -1 || echo "")
        if [ -n "$PORT" ]; then
          echo "================================"
          echo "✅ TUNNEL READY!"
          echo "🌐 HOST : serveo.net"
          echo "🔌 PORT : $PORT"
          echo "================================"
          break
        fi
        echo "Retry $i/25..."
      done

    - cat tunnel.log || true

    - echo "╔══════════════════════════════╗"
    - echo "║       SSH LOGIN DETAILS      ║"
    - echo "╠══════════════════════════════╣"
    - echo "🌐 HOST => serveo.net"
    - echo "🔌 PORT => $PORT"
    - echo "👤 USER => $USERNAME"
    - echo "🔑 PASS => $PASSWORD"
    - echo "💻 CMD  => ssh $USERNAME@serveo.net -p $PORT"
    - echo "╚══════════════════════════════╝"

    - sleep 21600
