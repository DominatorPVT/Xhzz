stages:
  - vps

free-vps:
  stage: vps
  image: ubuntu:22.04
  timeout: 5h 50m

  script:
    - apt-get update -qq
    - apt-get install -y openssh-server curl wget python3 net-tools sudo

    # User banana
    - useradd -m -s /bin/bash vpsuser || true
    - echo "vpsuser:Vps@2024#Secure" | chpasswd
    - echo "vpsuser ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

    # SSH config
    - mkdir -p /run/sshd
    - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
    - echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config
    - echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
    - /usr/sbin/sshd

    # ngrok setup
    - wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
    - tar -xzf ngrok-v3-stable-linux-amd64.tgz
    - chmod +x ngrok
    - ./ngrok config add-authtoken $NGROK_TOKEN
    - ./ngrok tcp 22 --log=stdout &
    - sleep 8

    # IP nikalo
    - |
      python3 -c "
      import urllib.request, json
      data = json.loads(urllib.request.urlopen('http://localhost:4040/api/tunnels').read())
      addr = data['tunnels'][0]['public_url'].replace('tcp://','')
      host, port = addr.split(':')
      print('='*45)
      print('  🖥️  GITLAB FREE VPS READY!')
      print('='*45)
      print(f'  SSH  : ssh -p {port} vpsuser@{host}')
      print(f'  User : vpsuser')
      print(f'  Pass : Vps@2024#Secure')
      print('  Time : ~5 hours 50 min')
      print('='*45)
      "

    # Alive rakhna
    - sleep 20000

  only:
    - web        # sirf manual trigger se chalega
