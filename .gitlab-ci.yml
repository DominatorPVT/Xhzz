stages:
  - vps

vps:
  stage: vps
  image: ubuntu:latest
  timeout: 6h
  script:
    - apt update
    - apt install -y openssh-server curl python3 openssh-client

    - USERNAME=$(tr -dc a-z0-9 </dev/urandom | head -c 10)
    - PASSWORD=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 10)

    - useradd -m $USERNAME
    - echo "$USERNAME:$PASSWORD" | chpasswd
    - usermod -aG sudo $USERNAME

    - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
    - sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
    - service ssh restart || true

    - ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q

    - |
      ssh -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -R 0:localhost:22 \
          plan@localhost.run \
          -- --output json 2>/dev/null > tunnel.log &

    - |
      for i in $(seq 1 20); do
        sleep 3
        URL=$(grep -o '"address":"[^"]*"' tunnel.log 2>/dev/null | head -1 | cut -d'"' -f4 || echo "")
        if [ -n "$URL" ]; then
          HOST=$(echo "$URL" | cut -d':' -f1)
          PORT=$(echo "$URL" | cut -d':' -f2)
          echo "================================"
          echo "🌐 HOST: $HOST"
          echo "🔌 PORT: $PORT"
          echo "================================"
          break
        fi
        echo "Retry $i/20..."
      done

    - cat tunnel.log || true

    - echo "================================"
    - echo "USERNAME => $USERNAME"
    - echo "PASSWORD => $PASSWORD"
    - echo "================================"

    - sleep 21600
